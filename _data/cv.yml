    Projects:
      - name: Dayli
        subtitle: Multi-Agent Collaborative Personal Terminal Intelligent Assistant
        role: Independent Developer
        start_date: 2025.10
        end_date: 2026.01
        url:
        summary: Addressing the high learning cost, repetitive tasks, and lack of personalization in existing agents for terminal users, this project aims for "everything in natural language". Developed a Native-CLI agent system based on native Asyncio for streaming interaction architecture, deeply integrated with layered memory systems and tool-calling capabilities.
        highlights:
          - "Architecture: Designed Asyncio-based async event-driven architecture for unified LLM and tool scheduling. Built multi-agent parallel workflow coordinator with async generator pattern for real-time event streams."
          - "Memory System: Constructed layered memory including global preferences, project context, episodic memory (SQLite), and semantic knowledge (LanceDB). Designed Self-Reflection based memory audit mechanism for automatic memory updates during task interaction."
          - "Context Engineering: Implemented dynamic context window optimization with hierarchical summarization. Integrated Agent Skills for modular agent extensions."
        tech_stack: "Python, Asyncio, LLM Agents, Agent skills, RAG, LanceDB, SQLite, Rich"

      - name: MedSketcher
        subtitle: Web-based Interactive Medical Image Auto-Segmentation Platform based on MedSAM
        role: Full-stack Engineer / Independent Developer
        start_date: 2024.05
        end_date: 2025.10
        url:
        summary: Addressing the high cost and difficulty of medical image annotation, developed a Human-in-the-loop intelligent annotation system. Integrated MedSAM fine-tuned segmentation model with high-performance Web graphics rendering engine.
        highlights:
          - "Model: Fine-tuned MedSAM with LoRA for parameter-efficient adaptation. Designed point/box interactive prompt inference and morphological post-processing."
          - "Frontend: Built 2D MPR and 3D volume rendering engine with VTK.js and Cornerstone. Optimized with double buffering and LUT for low-latency interaction."
          - "Backend: Built async inference service and data management platform with FastAPI. Completed data pipeline from DICOM/NIfTI parsing to annotation persistence."
        tech_stack: "PyTorch, SAM, FastAPI, Vue3, VTK.js, Cornerstone.js, WebGL"

